apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  labels:
    app: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  application.yml: |
    spring:
      application:
        name: order-processing-system
      datasource:
        url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          connection-timeout: 30000
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQLDialect
            format_sql: true
    server:
      port: 8080
    rocketmq:
      name-server: ${ROCKETMQ_NAMESERVER}
      producer:
        group: ${ROCKETMQ_PRODUCER_GROUP}
        send-timeout: 3000
        retry-times-when-send-failed: 2
      consumer:
        group: ${ROCKETMQ_CONSUMER_GROUP}
      topics:
        order-events: order-topic
    management:
      endpoints:
        web:
          exposure:
            include: health,info
      endpoint:
        health:
          show-details: always
    logging:
      level:
        com.example.order: DEBUG
