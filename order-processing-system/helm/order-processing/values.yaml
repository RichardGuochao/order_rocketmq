replicaCount: 2

image:
  repository: guochaorichard/order-processing
  tag: "1.0.0.20260423"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: "1000m"
    memory: "1Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

config:
  spring:
    profiles:
      active: default
  db:
    host: "mysql.database.svc.cluster.local"
    port: 3306
    name: "order"
    username: "root"
  rocketmq:
    nameserver: "rocketmq-namesrv.middleware.svc.cluster.local:9876"
    producer:
      group: "order-producer-group"
    consumer:
      group: "order-consumer-group"
    topics:
      order-events: "order-topic"

secret:
  db:
    password: "root"

ingress:
  enabled: false
