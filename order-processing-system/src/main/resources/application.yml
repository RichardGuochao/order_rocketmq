spring:
  application:
    name: order-processing-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql.database.svc.cluster.local}:${DB_PORT:3306}/${DB_NAME:order}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

rocketmq:
  name-server: ${ROCKETMQ_NAMESERVER:rocketmq-namesrv.middleware.svc.cluster.local:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:order-producer-group}
    send-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    group: ${ROCKETMQ_CONSUMER_GROUP:order-consumer-group}
    auto-start-consumer: false
  topics:
    order-events: ${ROCKETMQ_TOPIC_ORDER_EVENTS:order-topic}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.order: DEBUG
    org.apache.rocketmq: INFO
